<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Dungeon Pets — capybara hero versus a skeleton">
  <!-- dungeon floor band -->
  <rect x="0" y="58" width="100" height="30" fill="#3a2f55" opacity="0.7"/>
  <!-- VS spark in the middle -->
  <path d="M50 30 l3 9 9 -2 -6 8 6 8 -9 -2 -3 9 -3 -9 -9 2 6 -8 -6 -8 9 2 z" fill="#ffd23f" opacity="0.5"/>
  <!-- hero: capybara (left, facing right) -->
  <g transform="translate(8,30) scale(0.62)">
    <ellipse cx="20" cy="50" rx="7" ry="4" fill="#9a6f44"/><ellipse cx="40" cy="50" rx="7" ry="4" fill="#9a6f44"/>
    <ellipse cx="32" cy="36" rx="20" ry="18" fill="#b88a5a"/>
    <ellipse cx="32" cy="22" rx="13" ry="12" fill="#b88a5a"/>
    <ellipse cx="22" cy="13" rx="4" ry="5" fill="#9a6f44"/><ellipse cx="42" cy="13" rx="4" ry="5" fill="#9a6f44"/>
    <ellipse cx="32" cy="27" rx="9" ry="6" fill="#9a6f44"/>
    <circle cx="25" cy="20" r="3.2" fill="#fff"/><circle cx="39" cy="20" r="3.2" fill="#fff"/>
    <circle cx="25.6" cy="20.4" r="1.8" fill="#2a2230"/><circle cx="39.6" cy="20.4" r="1.8" fill="#2a2230"/>
  </g>
  <!-- enemy: skeleton (right, facing left) -->
  <g transform="translate(92,30) scale(-0.55,0.55)">
    <ellipse cx="32" cy="44" rx="13" ry="14" fill="#eef0f2"/>
    <circle cx="32" cy="24" r="14" fill="#eef0f2"/>
    <path d="M26 50 l-2 8 M32 51 l0 8 M38 50 l2 8" stroke="#eef0f2" stroke-width="3" stroke-linecap="round"/>
    <circle cx="26" cy="24" r="4" fill="#2a2230"/><circle cx="38" cy="24" r="4" fill="#2a2230"/>
    <circle cx="25" cy="23" r="1.4" fill="#ff5d5d"/><circle cx="37" cy="23" r="1.4" fill="#ff5d5d"/>
  </g>
