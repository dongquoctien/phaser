<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Explorer Oreo</title>
    <!-- Inline favicon (1x1) so the browser doesn't 404 on /favicon.ico. -->
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQDJ/pLvAAAAAElFTkSuQmCC"
    />

    <style>
      /* Pixelify Sans (Google Fonts, OFL) — self-hosted woff2 so it works
         offline, no network font request at runtime. */
      @font-face {
        font-family: 'Pixelify Sans';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url('/fonts/PixelifySans-400.woff2') format('woff2');
      }
      @font-face {
        font-family: 'Pixelify Sans';
        font-style: normal;
        font-weight: 700;
        font-display: block;
        src: url('/fonts/PixelifySans-700.woff2') format('woff2');
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0d12;
        overflow: hidden;
      }
      /* PIXEL MODE — crisp nearest-neighbor scaling (this is a pixel-art game). */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Stop the browser treating drags as scroll/zoom — the #1 cause of
           virtual-joystick jitter on mobile. Harmless for non-touch games. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
