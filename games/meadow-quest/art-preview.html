<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Meadow Quest — Pixel Art Preview</title>
  <style>
    body { margin: 0; background: #1a1c2c; color: #f4f4f4; font-family: system-ui, sans-serif; }
    header { padding: 12px 16px; border-bottom: 1px solid #333c57; font-size: 14px; }
    #grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 14px; padding: 18px; }
    .cell { background: #29366f22; border: 1px solid #333c57; border-radius: 10px; padding: 8px; text-align: center; }
    .cell canvas { image-rendering: pixelated; display: block; margin: 0 auto; background: #38b76433; border-radius: 6px; }
    .cell .name { font: 600 12px/1.4 ui-monospace, monospace; color: #94b0c2; margin-top: 6px; }
  </style>
</head>
<body>
  <header>Meadow Quest — pixel art preview · 32×32 Sweetie-16 · idle + attack</header>
  <div id="grid"></div>
  <script type="module">
    import Phaser from 'phaser';
    import { bakeMeadowArt } from '/src/art.ts';
    import { CharKeys } from '/src/types/keys.ts';

    const SCALE = 5;
    const keys = Object.values(CharKeys);

    class Bake extends Phaser.Scene {
      create() {
        bakeMeadowArt(this, 1);
        const grid = document.getElementById('grid');
        for (const key of keys) {
          if (!this.textures.exists(key)) continue;
          const cell = document.createElement('div');
          cell.className = 'cell';
          const holder = document.createElement('div');
          cell.appendChild(holder);
          const label = document.createElement('div');
          label.className = 'name'; label.textContent = key;
          cell.appendChild(label);
          grid.appendChild(cell);

          const src = this.textures.get(key).getSourceImage();
          const c = document.createElement('canvas');
          c.width = src.width * SCALE; c.height = src.height * SCALE;
          holder.appendChild(c);
          const ctx = c.getContext('2d');
          ctx.imageSmoothingEnabled = false;
          ctx.drawImage(src, 0, 0, c.width, c.height);
        }
      }
    }

    new Phaser.Game({
      type: Phaser.AUTO, parent: document.createElement('div'),
      width: 16, height: 16, pixelArt: true, scene: Bake, banner: false,
      audio: { noAudio: true },
    });
  </script>
</body>
</html>
