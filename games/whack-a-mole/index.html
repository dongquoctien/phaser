<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>TWDC Whack-a-Char</title>

    <!-- Open Graph / social share card. og.png is served next to this file at
         the deployed base, so an absolute URL is used for scrapers. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="TWDC Whack-a-Char" />
    <meta
      property="og:description"
      content="Bonk the cheeky characters as they pop up — but spare the sweet ones! Pick your weapon: pan, mace, or swatter."
    />
    <meta
      property="og:image"
      content="https://dongquoctien.github.io/phaser/whack-a-mole/og.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://dongquoctien.github.io/phaser/whack-a-mole/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TWDC Whack-a-Char" />
    <meta
      name="twitter:description"
      content="Bonk the cheeky characters — spare the sweet ones! Pick your weapon."
    />
    <meta
      name="twitter:image"
      content="https://dongquoctien.github.io/phaser/whack-a-mole/og.png"
    />

    <!-- Inline favicon (1x1) so the browser doesn't 404 on /favicon.ico. -->
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2315151f'/><path d='M9 6 q0 -1 1 -1 h12 q1 0 1 1 v20 q0 1 -1 1 h-12 q-1 0 -1 -1 z' fill='%237cf59b'/><rect x='9' y='6' width='14' height='3.5' rx='1' fill='%230a0a14'/><rect x='11' y='11' width='10' height='7' rx='1' fill='%230a0a14'/><rect x='12' y='12' width='8' height='5' rx='0.5' fill='%231a3a2a'/><circle cx='13' cy='21.5' r='1.5' fill='%230a0a14'/><rect x='12.4' y='21.5' width='1.2' height='2.4' fill='%230a0a14'/><circle cx='18' cy='22' r='1.1' fill='%230a0a14'/><circle cx='20.5' cy='22' r='1.1' fill='%230a0a14'/><rect x='9.5' y='27' width='3' height='2' rx='0.6' fill='%237cf59b'/><rect x='19.5' y='27' width='3' height='2' rx='0.6' fill='%237cf59b'/></svg>"
    />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0d12;
        overflow: hidden;
      }
      /* PIXEL MODE — crisp nearest-neighbor scaling for the pixel-art sprites. */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Stop the browser treating taps as scroll/zoom — keeps whacking crisp. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
        cursor: none; /* the in-game mallet IS the cursor */
      }
      #game canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
