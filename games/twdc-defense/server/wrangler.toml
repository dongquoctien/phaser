# Cloudflare Worker config for the TWDC Defense leaderboard backend.
# Deploy with:  npx wrangler deploy   (from this server/ folder)
name = "twdc-leaderboard"
main = "worker.js"
compatibility_date = "2024-09-01"

# KV namespace for sessions + scores. Create it once, then paste the id here:
#   npx wrangler kv namespace create LB
# [[kv_namespaces]]
# binding = "LB"
# id = "<paste-the-id-from-the-command-above>"

[vars]
# Lock this down to the game's static origin in production (not "*").
ALLOW_ORIGIN = "*"

# SECRET — never commit a real value. Set it with:
#   npx wrangler secret put LEADERBOARD_SECRET
# (a long random string; only the Worker ever sees it)
