    <style>
      /* Bangers (SIL OFL) — bold impact display font for titles + wave banners. */
      @font-face {
        font-family: 'Bangers';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url('fonts/Bangers-Regular.woff2') format('woff2');
      }
      /* Creepster (SIL OFL) — dripping zombie/horror font for BOSS intro titles. */
      @font-face {
        font-family: 'Creepster';
        font-style: normal;
        font-weight: 400;
        font-display: block;
        src: url('fonts/Creepster-Regular.woff2') format('woff2');
      }
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1c2c;
        overflow: hidden;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Stop the browser treating taps/drags as scroll/zoom (mobile). */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
