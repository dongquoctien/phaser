<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Gold Miner</title>
    <!-- Inline favicon (1x1) so the browser doesn't 404 on /favicon.ico. -->
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQDJ/pLvAAAAAElFTkSuQmCC"
    />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1c2c;
        overflow: hidden;
      }
      /* Crisp pixel scaling for the canvas on every browser. */
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
