<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phaser Arcade</title>
    <meta name="description" content="A collection of pixel-art games built with Phaser 3." />
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQDJ/pLvAAAAAElFTkSuQmCC"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #1a1c2c;
        overflow: hidden;
      }
      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      /* Crawlable + screen-reader link list; visually hidden once Phaser boots. */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }
      /* Visible fallback if JS is disabled. */
      noscript .fallback {
        display: block;
        max-width: 720px;
        margin: 40px auto;
        font-family: system-ui, sans-serif;
        color: #f4f4f4;
      }
      noscript .fallback a {
        color: #73eff7;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>

    <!-- Real, crawlable game links. build-all replaces the placeholder below. -->
    <nav id="game-links" class="sr-only" aria-label="Games">
      <ul>
        <!--GAME_LINKS-->
      </ul>
    </nav>

    <noscript>
      <div class="fallback">
        <h1>Phaser Arcade</h1>
        <ul>
          <!--GAME_LINKS_NOSCRIPT-->
        </ul>
      </div>
    </noscript>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
