name: Deploy games to GitHub Pages

# Builds every game under games/* plus the hub page and publishes dist/ to Pages.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # BASE_PATH must match the Pages URL path: /<repo>/ for project sites.
      - name: Build all games + hub
        run: npm run build:all
        env:
          BASE_PATH: /${{ github.event.repository.name }}/
          # Per-game leaderboard backend URLs (public Cloudflare Workers, not
          # secrets). Set as repository *variables*; build-all.mjs injects each as
          # that game's VITE_API_URL. Empty ⇒ that game builds offline.
          VITE_API_URL_TWDC: ${{ vars.VITE_API_URL_TWDC }}
          VITE_API_URL_WAM: ${{ vars.VITE_API_URL_WAM }}
          VITE_API_URL_OREO: ${{ vars.VITE_API_URL_OREO }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
