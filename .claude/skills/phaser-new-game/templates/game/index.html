<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>__GAME_TITLE__</title>
    <!-- Inline favicon (1x1) so the browser doesn't 404 on /favicon.ico. -->
    <link
      rel="icon"
      href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNk+M8AAAMBAQDJ/pLvAAAAAElFTkSuQmCC"
    />

    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0d0d12;
        overflow: hidden;
      }
      /* PIXEL MODE only — uncomment for crisp nearest-neighbor scaling.
         Leave commented for the default SVG/vector look (smooth). */
      /* canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      } */
      #game {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        /* Stop the browser treating drags as scroll/zoom — the #1 cause of
           virtual-joystick jitter on mobile. Harmless for non-touch games. */
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      #game canvas {
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
